<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="calculadora">
      <header>
        <h1>Calculadora</h1>
      </header>

      <section class="display-container">
        <input type="text" id="display" readonly value="0" />
      </section>

      <section class="botoes">
        <button class="btn btn-cinza" data-value="7">7</button>
        <button class="btn btn-cinza" data-value="8">8</button>
        <button class="btn btn-cinza" data-value="9">9</button>
        <button class="btn btn-laranja" data-value="/">÷</button>

        <button class="btn btn-cinza" data-value="4">4</button>
        <button class="btn btn-cinza" data-value="5">5</button>
        <button class="btn btn-cinza" data-value="6">6</button>
        <button class="btn btn-laranja" data-value="*">×</button>

        <button class="btn btn-cinza" data-value="1">1</button>
        <button class="btn btn-cinza" data-value="2">2</button>
        <button class="btn btn-cinza" data-value="3">3</button>
        <button class="btn btn-laranja" data-value="-">−</button>

        <button class="btn btn-cinza" data-value="0">0</button>
        <button class="btn btn-cinza" data-value=".">.</button>
        <button class="btn btn-vermelho" id="limpar">C</button>
        <button class="btn btn-laranja" data-value="+">+</button>

        <button class="btn btn-igual" id="igual">=</button>
      </section>
    </main>

    <script src="js/script.js"></script>
  </body>
</html>
